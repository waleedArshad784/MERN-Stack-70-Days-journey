<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Navbar</title>
    <Style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;

        }
       body{
        font-family: "poppins","sans-serif";
        background-color: #0f172a;
        color: white;
       }
       nav{
        width: 100%;
        padding: 1rem 5%;
        background: rgba(255,255,255, 0.05);
        backdrop-filter: blur(15px);
        margin-bottom: 2rem;
        display: flex;
        align-items: center;
        justify-content: flex-end;

       }
       .logo{
        font-size: 1.8rem;
        font-weight: 800px;
        color: #38bdf8;
        letter-spacing: 1px;
        margin-right: auto;


       }
       .navlink{
        list-style: none;
        display:flex ;
        gap: 2rem;
        margin-right: 30px;

       }
       .navlink li a{
        position: relative;
        font-size: 1.05rem;
        font-weight: 500;
        text-decoration: none;
        color: white;
       }
       .navlink li a:hover{
        color: #38bdf8 ;
        text-shadow: 0 0 10px  #38bdf8;
        transition: 0.3s;

       }
         .navlink li a:hover{
        color: #38bdf8 ;
        text-shadow: 0 0 10px  #38bdf8;
    

       }
       .btn{
        padding: 0.5rem 1.5rem;
        border-radius: 30px;
        font-weight: 600;
        font-size: 1rem;
        background: #38bdf8;
        color: #0f172a;
        box-shadow: 0 0 15px #38bdf8;
        border: none;
        cursor: pointer;
       }
       .btn  :hover{
        background: #38bdf8;
        box-shadow: 0 0 25px  #38bdf8;

       }


      

    </Style>
</head>
<body>
    <h2  style="text-align: center; padding: 2rem;">Flex Box  Navbar variation</h2>
    <nav>
        <div class="logo">CSSnippets</div>
        <ul class="navlink">
            <li><a href="#"></a>Home</li>
            <li><a href="#"></a>Services</li>
            <li><a href="#"></a>Contact</li>
            <li><a href="#"></a>Portfolio</li>
        </ul>
        <div class="btns">
             <button class="btn">
                login

        </button>
        </div>
        
    </nav>
    
</body>
</html>
