<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>self made logo</title>
</head>
<style>
    *{
        padding: 0;
        margin: 0;
        box-sizing: border-box;

    }
    .navbar{
        background-color: black;
        color: white;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 1.5rem  10%;
        margin-bottom: 2rem;    
    
    }
    .logo{
        font-size: 1.8rem;
        font-weight: 800;
        letter-spacing: 1px;

    }
    .links{
        display: flex;
        
       
        


    }
    .links li{
        list-style: none;
        display: inline-block;
        margin: 30px;
        font-size: 1rem;
        font-weight: 400px;

    }
    .btn button{
        padding: 0.5rem 1.5rem;
        font-weight: 400px;
        font-size: 1rem;
        border-radius: 20px;
        background-color: blue;
        border: none;
        box-shadow: 0 0 20px blue;
        color: white;
        cursor: pointer;

    }
     .links li:hover{
        background-color: white;
        color: black;
        border: 2px solid white;
        border-radius: 10px;
        margin: 20px;
        padding: 10px;
        cursor: pointer;
    }

</style>
<body>
    <nav>
        <div class="navbar">
            <div class="logo">Stripe</div>
            <div class="links">
                <ul>
                    <li><a href="#"></a>Home</li>
                    <li><a href="#"></a>About</li>
                    <li><a href="#"></a>Service</li>
                    <li><a href="#"></a>Contact</li>
                </ul>
            </div>
            <div class="btn">
                <button>SignIn </button>
            </div>
        </div>
    </nav>

    
</body>
</html>
